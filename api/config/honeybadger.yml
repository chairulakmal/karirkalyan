---
# For more options, see https://docs.honeybadger.io/lib/ruby/gem-reference/configuration

api_key: "<%= ENV['HONEYBADGER_API_KEY'] %>"

# The environment your app is running in.
env: "<%= Rails.env %>"

# The absolute path to your project folder.
root: "<%= Rails.root.to_s %>"

# Honeybadger won't report errors in these environments.
development_environments:
- test
- development
- cucumber

# By default, Honeybadger won't report errors in the development_environments.
# You can override this by explicitly setting report_data to true.
# report_data: true

# The current Git revision of your project. Defaults to the last commit hash.
# revision: null

# Enable verbose debug logging (useful for troubleshooting).
debug: false

# Honeybadger Insights — OFF, deliberately.
#
# With Insights on, honeybadger's Rails plugin subscribes to ActiveSupport notifications and
# ships an event per request, per SQL query and per mailer send: a continuous stream of
# telemetry from healthy traffic, not just from failures. `/privacy` names Honeybadger as one
# of five sub-processors and says it "receives error reports". That sentence is only true with
# this off.
#
# Turning it on is a change to what a third party sees, not a monitoring tweak: the legal pages
# (both locales) and SPEC.md § Legal pages move in the same PR, or the policy becomes false.
insights:
  enabled: false
