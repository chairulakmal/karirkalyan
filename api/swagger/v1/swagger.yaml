---
openapi: 3.0.1
info:
  title: KarirKalyan API
  version: v1
  description: 'Job application tracker API: Rails 8, Devise + JWT'
servers:
- url: http://localhost:3001
  description: Local development
- url: https://api-production-4899.up.railway.app
  description: Production
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT issued on sign-in. Pass as: Authorization: Bearer <token>'
paths:
  "/api/v1/applications":
    get:
      summary: List applications (scoped to current user)
      tags:
      - Applications
      security:
      - bearerAuth: []
      parameters:
      - name: status
        in: query
        required: false
        schema:
          type: string
        description: 'Comma-separated states, e.g. `applied,offer`; any member matches.
          Unknown states are dropped, and a list left with none is **unfiltered, not
          empty**: a query the server understood nothing of has told it nothing, so
          it must not answer with a blank page dressed as a real result. There is
          deliberately no query meaning "show nothing".'
      - name: company
        in: query
        required: false
        schema:
          type: string
        description: Exact company name, case-sensitive. Unlike `status`, a name no
          application carries is a real filter and legitimately matches nothing, but
          blank or whitespace-only is ignored, like `status`, and returns everything.
      - name: source
        in: query
        required: false
        schema:
          type: string
        description: Job board, matched as a case-insensitive substring of the URL
          (e.g. `linkedin.com`); there is no `source` column. Pass `(none)` for applications
          with no link. Like `company`, an unmatched value legitimately returns nothing,
          while blank or whitespace-only is ignored.
      - name: japanese_level
        in: query
        required: false
        schema:
          type: string
        description: 'Comma-separated levels from `none,conversational,business,n2,n1`;
          any member matches, with `status`''s exact contract: unknown members are
          dropped and a list left with none is unfiltered, not empty. Matches the
          recorded value only: `none` means a recorded "no Japanese required", never
          a null column.'
      - name: after
        in: query
        required: false
        schema:
          type: string
        description: 'Cursor from a previous page''s `meta.next_cursor`: an opaque
          Base64 timestamp. A malformed cursor returns the first page.'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        description: Page size, clamped to 1..100 rather than rejected. Non-numeric
          reads as 1; absent or empty reads as the default 10.
      responses:
        '200':
          description: does not return another user's applications
        '401':
          description: not authenticated
    post:
      summary: Create an application
      tags:
      - Applications
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: created with the Japan-market fields; agency_name resolves
            to an agencies row
        '422':
          description: validation failed (blank company or role)
        '401':
          description: not authenticated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                application:
                  type: object
                  properties:
                    company:
                      type: string
                      example: Basecamp
                    role:
                      type: string
                      example: Rails Engineer
                    status:
                      type: string
                      enum:
                      - wishlist
                      - draft
                      - applied
                      example: applied
                      description: Initial state, one of the entry states (defaults
                        to draft). Later changes go through /transition.
                    applied_at:
                      type: string
                      format: date-time
                      description: Optional; only used when status is 'applied'. Backdates
                        applied_at (defaults to now).
                    url:
                      type: string
                    notes:
                      type: string
                    follow_up_at:
                      type: string
                      format: date-time
                    channel:
                      type: string
                      enum:
                      - direct
                      - agent
                      - referral
                      nullable: true
                      description: How this application reached the company. `agent`
                        is what the ownership check keys on.
                    agency_name:
                      type: string
                      nullable: true
                      description: Agency name, resolved server-side to a per-user
                        agencies row (created on first use). Blank clears the agency;
                        the key absent leaves it untouched.
                    japanese_level:
                      type: string
                      enum:
                      - none
                      - conversational
                      - business
                      - n2
                      - n1
                      nullable: true
                      description: 'The posting''s Japanese requirement: what it asks,
                        not what the user holds.'
                    sponsorship:
                      type: string
                      enum:
                      - unknown
                      - available
                      - unavailable
                      nullable: true
                      description: Does the employer sponsor a work visa. Defaults
                        to `unknown` (decision-relevant signal, not absence).
                    status_of_residence:
                      type: string
                      enum:
                      - engineer_specialist
                      - highly_skilled
                      - other
                      nullable: true
                      description: Which 在留資格 a sponsored role falls under. Null when
                        unrecorded; only meaningful with sponsorship = available.
                    hiring_entity:
                      type: string
                      enum:
                      - own_entity
                      - eor
                      - contractor
                      - unsupported
                      nullable: true
                      description: 'How a Japan-resident hire is employed: own_entity
                        / eor / contractor / unsupported. Null when unrecorded.'
                    company_timezone:
                      type: string
                      enum:
                      - America/Los_Angeles
                      - America/Denver
                      - America/Chicago
                      - America/New_York
                      - America/Sao_Paulo
                      - Europe/London
                      - Europe/Berlin
                      - Asia/Kolkata
                      - Asia/Singapore
                      - Australia/Sydney
                      - Asia/Tokyo
                      nullable: true
                      description: The company's home timezone as a curated IANA identifier.
                        Drives the JST-survivability read. Null when unrecorded.
                    overlap_hours_required:
                      type: number
                      nullable: true
                      description: Daily working-hours overlap the role requires,
                        0..24. Null when unrecorded.
                    comp_annual_min_yen:
                      type: integer
                      nullable: true
                      description: Quoted 年収, low end, in yen.
                    comp_annual_max_yen:
                      type: integer
                      nullable: true
                      description: High end; null when one figure is quoted.
                    comp_months_guaranteed:
                      type: number
                      nullable: true
                      description: Months of base guaranteed per year (12 + guaranteed
                        bonus).
                    comp_months_variable:
                      type: number
                      nullable: true
                      description: Performance-tied bonus months on top.
                    posting_snapshot:
                      type: string
                      nullable: true
                      description: Stripped posting text, as prefill's `posting_text`
                        returned it. Capped at 12,000 characters. Excluded from list
                        payloads; GET /applications/{id} returns it.
                  required:
                  - company
                  - role
              required:
              - application
  "/api/v1/applications/ownership_check":
    get:
      summary: Check whether an agency already has an open ownership window on a company
      tags:
      - Applications
      security:
      - bearerAuth: []
      description: The first agency to submit a candidate to a company owns that candidacy
        for `window_months` (~12–18 months; this app assumes 18, the conservative
        end), and the fee follows the owner even if the candidate later reaches the
        company another way. A submission is an application to the company with `channel
        = agent` whose `applied_at` is inside the window. A warning surface only;
        nothing blocks.
      parameters:
      - name: company
        in: query
        required: false
        schema:
          type: string
        description: Exact company name, the list filter's matching rule. Blank returns
          an empty list rather than erroring, because the form calls this as the user
          works.
      responses:
        '200':
          description: blank company reads as an empty list, never an error
        '401':
          description: not authenticated
  "/api/v1/applications/prefill":
    post:
      summary: Pre-fill application fields from a job posting (AI extraction)
      tags:
      - Applications
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: extracted fields returned for the user to review
        '422':
          description: the URL is unusable (invalid_url), the site refused an automated
            reader (prefill_blocked), or the paste exceeds the cap once stripped (prefill_paste_too_long)
        '502':
          description: the page could not be fetched (prefill_unreachable), or it
            was fetched and yielded no posting (prefill_failed)
        '503':
          description: ANTHROPIC_API_KEY is not configured
        '401':
          description: not authenticated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  example: https://example.com/jobs/42
                  description: The posting URL to fetch, strip, and extract. Supply
                    this or `text`.
                text:
                  type: string
                  example: Backend Engineer at Mercari. Tokyo, full-time. Ruby, Go…
                  description: The posting text, already fetched by the user; use
                    when `url` came back `prefill_blocked` or `prefill_failed`. Skips
                    the fetch and runs the same extraction. Must be under 12,000 characters
                    (`MAX_TEXT_CHARS`) **once stripped to text**, which is far more
                    than 12,000 characters of markup allows; an over-cap paste is
                    refused as `prefill_paste_too_long` rather than truncated. Takes
                    precedence over `url`, which is then echoed back unfetched. Ignored
                    unless it is a JSON string.
  "/api/v1/applications/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Get a single application
      tags:
      - Applications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: application found (+ valid_next_states, timeline_entries, agency_name,
            posting_snapshot)
        '404':
          description: not found or belongs to another user
        '401':
          description: not authenticated
    patch:
      summary: Update an application (text fields + file upload)
      tags:
      - Applications
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: application updated
        '409':
          description: 'stale record: another request updated first; refresh and retry'
        '422':
          description: validation failed
        '401':
          description: not authenticated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                application:
                  type: object
                  properties:
                    company:
                      type: string
                    role:
                      type: string
                    url:
                      type: string
                    notes:
                      type: string
                    follow_up_at:
                      type: string
                      format: date-time
                    channel:
                      type: string
                      enum:
                      - direct
                      - agent
                      - referral
                      nullable: true
                    agency_name:
                      type: string
                      nullable: true
                      description: Resolved server-side to a per-user agencies row.
                        Blank clears; key absent leaves untouched.
                    japanese_level:
                      type: string
                      enum:
                      - none
                      - conversational
                      - business
                      - n2
                      - n1
                      nullable: true
                    sponsorship:
                      type: string
                      enum:
                      - unknown
                      - available
                      - unavailable
                      nullable: true
                    status_of_residence:
                      type: string
                      enum:
                      - engineer_specialist
                      - highly_skilled
                      - other
                      nullable: true
                    hiring_entity:
                      type: string
                      enum:
                      - own_entity
                      - eor
                      - contractor
                      - unsupported
                      nullable: true
                    company_timezone:
                      type: string
                      enum:
                      - America/Los_Angeles
                      - America/Denver
                      - America/Chicago
                      - America/New_York
                      - America/Sao_Paulo
                      - Europe/London
                      - Europe/Berlin
                      - Asia/Kolkata
                      - Asia/Singapore
                      - Australia/Sydney
                      - Asia/Tokyo
                      nullable: true
                    overlap_hours_required:
                      type: number
                      nullable: true
                    interview_at:
                      type: string
                      format: date-time
                      nullable: true
                      description: The upcoming interview instant. A naive value is
                        parsed in JST; stored UTC.
                    comp_annual_min_yen:
                      type: integer
                      nullable: true
                    comp_annual_max_yen:
                      type: integer
                      nullable: true
                    comp_months_guaranteed:
                      type: number
                      nullable: true
                    comp_months_variable:
                      type: number
                      nullable: true
                    posting_snapshot:
                      type: string
                      nullable: true
                    lock_version:
                      type: integer
                      description: Must match current record version to prevent concurrent
                        overwrites
              required:
              - application
    delete:
      summary: Delete an application
      tags:
      - Applications
      security:
      - bearerAuth: []
      responses:
        '204':
          description: application deleted
        '401':
          description: not authenticated
  "/api/v1/applications/{id}/transition":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    patch:
      summary: Transition status via FSM
      tags:
      - Applications
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: status transitioned and timeline entry written
        '422':
          description: invalid transition (e.g. draft → offer)
        '409':
          description: stale record
        '401':
          description: not authenticated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                  - wishlist
                  - draft
                  - applied
                  - phone_screen
                  - technical
                  - final_round
                  - offer
                  - accepted
                  - declined
                  - rejected
                  - ghosted
                  - withdrawn
                  - archived
                  description: Target state. Must be a valid FSM transition from the
                    current status.
              required:
              - status
  "/api/v1/applications/{id}/resume":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Download resume PDF
      tags:
      - Applications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 'resume binary (Content-Disposition: inline, named after the
            application)'
        '404':
          description: no resume uploaded for this application
        '401':
          description: not authenticated
  "/api/v1/applications/{id}/cover_letter":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Download cover letter PDF
      tags:
      - Applications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 'cover letter binary (Content-Disposition: inline, named after
            the application)'
        '404':
          description: no cover letter uploaded
        '401':
          description: not authenticated
  "/api/v1/applications/{id}/interview":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Download the upcoming interview as an .ics calendar event
      tags:
      - Applications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: iCalendar event (text/calendar attachment, named -interview.ics)
        '404':
          description: no interview scheduled for this application
        '401':
          description: not authenticated
  "/api/v1/applications/{id}/talking_points":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Generate cover-letter talking points from the resume and posting
      tags:
      - Applications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: match-point bullets, generated on demand (not persisted)
        '422':
          description: no resume or no saved posting to compare (talking_points_missing_input)
        '401':
          description: not authenticated
  "/api/v1/auth/sign_in":
    post:
      summary: Sign in
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: signed in; JWT returned in Authorization header
        '401':
          description: invalid credentials
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                    password:
                      type: string
                  required:
                  - email
                  - password
              required:
              - user
  "/api/v1/auth/sign_out":
    delete:
      summary: Sign out (rotates JTI to invalidate the token)
      tags:
      - Auth
      security:
      - bearerAuth: []
      responses:
        '204':
          description: signed out
        '401':
          description: not authenticated
  "/api/v1/auth/account":
    delete:
      summary: Erase the account and everything under it
      tags:
      - Auth
      security:
      - bearerAuth: []
      description: |
        Destroys the caller's user record. Applications, timeline entries and the uploaded
        resumes and cover letters inside them cascade with it, and the JWT stops validating
        because there is no longer a user to look its `sub` up against.

        There is no self-service button for this in the UI, and no sign-up endpoint to undo it
        with; see SPEC.md § Registration is closed. The shared demo account is exempt: its
        credentials are public, so anyone could otherwise erase it.
      responses:
        '204':
          description: account erased
        '401':
          description: not authenticated
        '403':
          description: the demo account cannot be erased
  "/api/v1/dashboard":
    get:
      summary: Application stats for the current user
      tags:
      - Dashboard
      security:
      - bearerAuth: []
      responses:
        '200':
          description: stats aggregation; by_status is empty and total is 0 for a
            user with no applications
          content:
            application/json:
              schema:
                type: object
                required:
                - by_status
                - facets
                - total
                - avg_days_to_offer
                - response_rate
                - ghost_rate
                - avg_days_in_stage
                - ghost_risk
                - user
                properties:
                  by_status:
                    type: object
                    additionalProperties:
                      type: integer
                    description: Application count per status
                  facets:
                    type: array
                    description: "[company, job-board host, status, japanese_level]
                      per application; the frontend cross-narrows every filter from
                      it"
                    items:
                      type: array
                      minItems: 4
                      maxItems: 4
                  total:
                    type: integer
                  avg_days_to_offer:
                    type: number
                    nullable: true
                    description: Applied date to offer timeline entry; null until
                      one reaches offer
                  response_rate:
                    type: integer
                    nullable: true
                    description: Percent of applied applications the company replied
                      to (advanced or rejected); null when none applied
                  ghost_rate:
                    type: integer
                    nullable: true
                    description: Percent of applied applications that were ghosted;
                      null when none applied
                  avg_days_in_stage:
                    type: number
                    nullable: true
                    description: Average days in-stage across in-flight applications;
                      null when none active
                  ghost_risk:
                    type: object
                    required:
                    - thresholds
                    - basis
                    - sample_sizes
                    - at_risk
                    description: Applications silent past the user's p90 response
                      time for their stage
                    properties:
                      thresholds:
                        type: object
                        additionalProperties:
                          type: number
                        description: Days of silence tolerated per stage, keyed on
                          applied/phone_screen
                      basis:
                        type: object
                        additionalProperties:
                          type: string
                          enum:
                          - personal
                          - default
                        description: Whether each threshold came from the user's own
                          history or the global default
                      sample_sizes:
                        type: object
                        additionalProperties:
                          type: integer
                        description: Completed responses behind each threshold
                      at_risk:
                        type: array
                        description: Longest silence first
                        items:
                          type: object
                          required:
                          - id
                          - company
                          - role
                          - status
                          - lock_version
                          - days_in_stage
                          - threshold
                          properties:
                            id:
                              type: integer
                            company:
                              type: string
                            role:
                              type: string
                            status:
                              type: string
                              enum:
                              - applied
                              - phone_screen
                            lock_version:
                              type: integer
                              description: So the UI can transition inline
                            days_in_stage:
                              type: number
                            threshold:
                              type: number
                  user:
                    type: object
                    description: The GET /me payload, folded in; the dashboard was
                      fetching both
                    required:
                    - id
                    - email
                    - created_at
                    - updated_at
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
        '401':
          description: not authenticated
  "/api/v1/exports/applications":
    get:
      summary: Download every application as CSV
      tags:
      - Exports
      security:
      - bearerAuth: []
      description: 'A convenience view: one row per application, blobs excluded. The
        data-safety artefact is GET /api/v1/exports/account.'
      responses:
        '200':
          description: CSV of the user's applications
        '401':
          description: not authenticated
  "/api/v1/exports/account":
    get:
      summary: Download the full account archive as a zip
      tags:
      - Exports
      security:
      - bearerAuth: []
      description: account.json (user, applications, timeline) plus the stored resumes
        and cover letters. The leg of the backup story the user can pull themselves.
      responses:
        '200':
          description: zip archive of the whole account
        '401':
          description: not authenticated
  "/api/v1/me":
    get:
      summary: Get the authenticated user's profile
      tags:
      - Me
      security:
      - bearerAuth: []
      responses:
        '200':
          description: current user profile (residence fields, days-remaining, and
            the visa reference)
        '401':
          description: not authenticated
    patch:
      summary: Update the authenticated user's residence status
      tags:
      - Me
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: a permanent resident has no clock, so days-remaining is null
            even with a date
        '422':
          description: an unknown residence status is rejected
        '401':
          description: not authenticated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    residence_status:
                      type: string
                      enum:
                      - engineer_specialist
                      - highly_skilled
                      - permanent_resident
                      - spouse_or_dependent
                      - other
                      nullable: true
                    residence_expires_on:
                      type: string
                      format: date
                      nullable: true
              required:
              - user
  "/api/v1/passkeys/options":
    post:
      summary: WebAuthn registration options
      tags:
      - Passkeys
      security:
      - bearerAuth: []
      description: |
        Creation options for enrolling a passkey (SPEC.md § Passkeys): discoverable
        credentials (`residentKey: "required"`), no authenticator attachment restriction,
        `attestation: "none"`. The challenge is single-use and expires in five minutes.
      responses:
        '200':
          description: creation options
        '401':
          description: not authenticated
  "/api/v1/passkeys":
    get:
      summary: List enrolled passkeys
      tags:
      - Passkeys
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 'the user''s passkeys: id, nickname, created_at, last_used_at
            only'
    post:
      summary: Enroll a passkey
      tags:
      - Passkeys
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: passkey enrolled
        '422':
          description: attestation does not verify, or the challenge expired
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                credential:
                  type: object
                  description: The browser PublicKeyCredential, serialized with toJSON()
                nickname:
                  type: string
              required:
              - credential
  "/api/v1/passkeys/{id}":
    delete:
      summary: Remove a passkey
      tags:
      - Passkeys
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '204':
          description: removed
        '404':
          description: 'another user''s passkey: scoped, never a 403'
  "/api/v1/auth/passkey/options":
    post:
      summary: WebAuthn assertion options
      tags:
      - Auth
      description: |
        Assertion options for passkey sign-in: unauthenticated, usernameless. The
        allow-list is empty (credentials are discoverable; the browser's picker chooses).
        The challenge is single-use and expires in five minutes.
      responses:
        '200':
          description: assertion options
  "/api/v1/auth/passkey":
    post:
      summary: Sign in with a passkey
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: signed in; JWT returned in Authorization header
        '401':
          description: unknown credential, bad challenge, or failed verification
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                challenge:
                  type: string
                  description: The challenge echoed from the options response
                credential:
                  type: object
                  description: The browser PublicKeyCredential assertion, serialized
                    with toJSON()
              required:
              - challenge
              - credential
  "/api/v1/push_subscriptions/public_key":
    get:
      summary: The VAPID public key the browser subscribes with
      tags:
      - Push
      security:
      - bearerAuth: []
      description: |
        Served rather than duplicated into a web-side env var, so the two services
        cannot drift (SPEC.md § Push notifications). 503 push_unavailable when the
        server has no VAPID keys; the rest of the app keeps working.
      responses:
        '200':
          description: the public key
        '503':
          description: push not configured on this server
  "/api/v1/push_subscriptions":
    post:
      summary: Register this browser's push subscription
      tags:
      - Push
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: subscription registered
        '422':
          description: 'validation failed: blank keys, or the per-user ceiling'
        '401':
          description: not authenticated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                subscription:
                  type: object
                  description: The browser PushSubscription, serialized with toJSON()
                  properties:
                    endpoint:
                      type: string
                    keys:
                      type: object
                      properties:
                        p256dh:
                          type: string
                        auth:
                          type: string
                      required:
                      - p256dh
                      - auth
                  required:
                  - endpoint
                  - keys
              required:
              - subscription
    delete:
      summary: Unsubscribe this browser (idempotent)
      tags:
      - Push
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '204':
          description: 'unsubscribed: a 204 even for an endpoint the server never
            knew, because the state the caller asked for is the state that obtains'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint:
                  type: string
              required:
              - endpoint
  "/api/v1/transitions":
    get:
      summary: Get the FSM's effective transition table
      tags:
      - Transitions
      security:
      - bearerAuth: []
      description: The legal status transitions, derived server-side from the FSM.
        `transitions` maps every state to its valid next states with the archived
        rule folded in; terminal states map to an empty array. `active_states` is
        the stages an application is still in play in, not derivable from the rest
        of the payload, since rejected, ghosted and withdrawn are non-terminal yet
        inactive. Clients consume this at runtime instead of hardcoding the table.
      responses:
        '200':
          description: the effective transition table
        '401':
          description: not authenticated
