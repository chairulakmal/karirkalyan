---
openapi: 3.0.1
info:
  title: KarirKalyan API
  version: v1
  description: Job application tracker API — Rails 8, Devise + JWT
servers:
- url: http://localhost:3001
  description: Local development
- url: https://kk.chairulakmal.com
  description: Production
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT issued on sign-in. Pass as: Authorization: Bearer <token>'
paths:
  "/api/v1/applications":
    get:
      summary: List applications (scoped to current user)
      tags:
      - Applications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: does not return another user's applications
        '401':
          description: not authenticated
    post:
      summary: Create an application
      tags:
      - Applications
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: defaults to draft when status is omitted
        '422':
          description: validation failed (blank company or role)
        '401':
          description: not authenticated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                application:
                  type: object
                  properties:
                    company:
                      type: string
                      example: Basecamp
                    role:
                      type: string
                      example: Rails Engineer
                    status:
                      type: string
                      enum:
                      - wishlist
                      - draft
                      - applied
                      example: applied
                      description: Initial state — one of the entry states (defaults
                        to draft). Later changes go through /transition.
                    applied_at:
                      type: string
                      format: date-time
                      description: Optional; only used when status is 'applied'. Backdates
                        applied_at (defaults to now).
                    url:
                      type: string
                    notes:
                      type: string
                    follow_up_at:
                      type: string
                      format: date-time
                  required:
                  - company
                  - role
              required:
              - application
  "/api/v1/applications/prefill":
    post:
      summary: Pre-fill application fields from a job URL (AI extraction)
      tags:
      - Applications
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: extracted fields returned for the user to review
        '422':
          description: bad or private/internal URL
        '401':
          description: not authenticated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  example: https://example.com/jobs/42
              required:
              - url
  "/api/v1/applications/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Get a single application
      tags:
      - Applications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: application found
        '404':
          description: not found or belongs to another user
        '401':
          description: not authenticated
    patch:
      summary: Update an application (text fields + file upload)
      tags:
      - Applications
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: application updated
        '409':
          description: stale record — another request updated first; refresh and retry
        '422':
          description: validation failed
        '401':
          description: not authenticated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                application:
                  type: object
                  properties:
                    company:
                      type: string
                    role:
                      type: string
                    url:
                      type: string
                    notes:
                      type: string
                    follow_up_at:
                      type: string
                      format: date-time
                    lock_version:
                      type: integer
                      description: Must match current record version to prevent concurrent
                        overwrites
              required:
              - application
    delete:
      summary: Delete an application
      tags:
      - Applications
      security:
      - bearerAuth: []
      responses:
        '204':
          description: application deleted
        '401':
          description: not authenticated
  "/api/v1/applications/{id}/transition":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    patch:
      summary: Transition status via FSM
      tags:
      - Applications
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: status transitioned and timeline entry written
        '422':
          description: invalid transition (e.g. draft → offer)
        '409':
          description: stale record
        '401':
          description: not authenticated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                  - wishlist
                  - draft
                  - applied
                  - phone_screen
                  - technical
                  - final_round
                  - offer
                  - accepted
                  - declined
                  - rejected
                  - ghosted
                  - withdrawn
                  - archived
                  description: Target state. Must be a valid FSM transition from the
                    current status.
              required:
              - status
  "/api/v1/applications/{id}/resume":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Download resume PDF
      tags:
      - Applications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 'resume binary (Content-Disposition: attachment)'
        '404':
          description: no resume uploaded for this application
        '401':
          description: not authenticated
  "/api/v1/applications/{id}/cover_letter":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Download cover letter PDF
      tags:
      - Applications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: 'cover letter binary (Content-Disposition: attachment)'
        '404':
          description: no cover letter uploaded
        '401':
          description: not authenticated
  "/api/v1/auth/sign_up":
    post:
      summary: Register a new account
      tags:
      - Auth
      parameters: []
      responses:
        '201':
          description: account created
        '422':
          description: validation failed (duplicate email or blank password)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      example: user@example.com
                    password:
                      type: string
                      example: password123
                  required:
                  - email
                  - password
              required:
              - user
  "/api/v1/auth/sign_in":
    post:
      summary: Sign in
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: signed in — JWT returned in Authorization header
        '401':
          description: invalid credentials
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                    password:
                      type: string
                  required:
                  - email
                  - password
              required:
              - user
  "/api/v1/auth/sign_out":
    delete:
      summary: Sign out — rotates JTI to invalidate the token
      tags:
      - Auth
      security:
      - bearerAuth: []
      responses:
        '204':
          description: signed out
        '401':
          description: not authenticated
  "/api/v1/dashboard":
    get:
      summary: Application stats for the current user
      tags:
      - Dashboard
      security:
      - bearerAuth: []
      responses:
        '200':
          description: stats aggregation — by_status is empty and total is 0 for a
            user with no applications
          content:
            application/json:
              schema:
                type: object
                required:
                - by_status
                - facets
                - total
                - avg_days_to_offer
                - ghost_risk
                - user
                properties:
                  by_status:
                    type: object
                    additionalProperties:
                      type: integer
                    description: Application count per status
                  facets:
                    type: array
                    description: "[company, job-board host] per application"
                    items:
                      type: array
                      items:
                        type: string
                      minItems: 2
                      maxItems: 2
                  total:
                    type: integer
                  avg_days_to_offer:
                    type: number
                    nullable: true
                    description: Applied date → offer timeline entry; null until one
                      reaches offer
                  ghost_risk:
                    type: object
                    required:
                    - thresholds
                    - basis
                    - sample_sizes
                    - at_risk
                    description: Applications silent past the user's p90 response
                      time for their stage
                    properties:
                      thresholds:
                        type: object
                        additionalProperties:
                          type: number
                        description: Days of silence tolerated per stage, keyed on
                          applied/phone_screen
                      basis:
                        type: object
                        additionalProperties:
                          type: string
                          enum:
                          - personal
                          - default
                        description: Whether each threshold came from the user's own
                          history or the global default
                      sample_sizes:
                        type: object
                        additionalProperties:
                          type: integer
                        description: Completed responses behind each threshold
                      at_risk:
                        type: array
                        description: Longest silence first
                        items:
                          type: object
                          required:
                          - id
                          - company
                          - role
                          - status
                          - lock_version
                          - days_in_stage
                          - threshold
                          properties:
                            id:
                              type: integer
                            company:
                              type: string
                            role:
                              type: string
                            status:
                              type: string
                              enum:
                              - applied
                              - phone_screen
                            lock_version:
                              type: integer
                              description: So the UI can transition inline
                            days_in_stage:
                              type: number
                            threshold:
                              type: number
                  user:
                    type: object
                    description: The GET /me payload, folded in — the dashboard was
                      fetching both
                    required:
                    - id
                    - email
                    - created_at
                    - updated_at
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
        '401':
          description: not authenticated
  "/api/v1/exports/applications":
    get:
      summary: Download every application as CSV
      tags:
      - Exports
      security:
      - bearerAuth: []
      description: 'A convenience view: one row per application, blobs excluded. The
        data-safety artefact is GET /api/v1/exports/account.'
      responses:
        '200':
          description: CSV of the user's applications
        '401':
          description: not authenticated
  "/api/v1/exports/account":
    get:
      summary: Download the full account archive as a zip
      tags:
      - Exports
      security:
      - bearerAuth: []
      description: account.json (user, applications, timeline) plus the stored resumes
        and cover letters. The leg of the backup story the user can pull themselves.
      responses:
        '200':
          description: zip archive of the whole account
        '401':
          description: not authenticated
  "/api/v1/me":
    get:
      summary: Get the authenticated user's profile
      tags:
      - Me
      security:
      - bearerAuth: []
      responses:
        '200':
          description: current user profile
        '401':
          description: not authenticated
  "/api/v1/transitions":
    get:
      summary: Get the FSM's effective transition table
      tags:
      - Transitions
      security:
      - bearerAuth: []
      description: The legal status transitions, derived server-side from the FSM.
        `transitions` maps every state to its valid next states with the archived
        rule folded in; terminal states map to an empty array. Clients consume this
        at runtime instead of hardcoding the table.
      responses:
        '200':
          description: the effective transition table
        '401':
          description: not authenticated
