services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER:     ${DB_USERNAME:-karirkalyan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-karirkalyan}
      POSTGRES_DB:       api_development
    ports:
      - "${DB_PASSWORD:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
