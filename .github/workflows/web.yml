name: web-ci

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: web

jobs:
  # See api.yml for why this exists: a skipped required check blocks the push,
  # so path filtering happens here rather than on the workflow trigger.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        working-directory: .
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only \
              "origin/${{ github.base_ref }}...${{ github.event.pull_request.head.sha }}")
          else
            before="${{ github.event.before }}"
            # First push to a branch, or a force-push: no reliable base. Run everything.
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ] \
               || ! git cat-file -e "$before^{commit}" 2>/dev/null; then
              echo "code=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            files=$(git diff --name-only "$before" "${{ github.sha }}")
          fi

          echo "Changed files:"
          printf '%s\n' "$files" | sed 's/^/  /'

          # Anything not on this list is treated as code, so an unrecognised path
          # errs toward running CI rather than skipping it.
          non_docs=$(printf '%s\n' "$files" \
            | grep -vE '(\.md$|^LICENSE$|^notes/|^web/public/llms\.txt$)' || true)

          if [ -n "$non_docs" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  verify:
    name: Next lint, typecheck & build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      # Build-time placeholder; real value comes from Railway in production.
      API_URL: http://localhost:3001

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  e2e:
    name: Playwright E2E
    needs: [changes, verify]
    if: github.event_name == 'push' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: karirkalyan
          POSTGRES_PASSWORD: karirkalyan
          POSTGRES_DB: api_development
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U karirkalyan"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: development
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: karirkalyan
      DB_PASSWORD: karirkalyan
      DATABASE_URL: postgresql://karirkalyan:karirkalyan@localhost:5432/api_development
      DEVISE_JWT_SECRET_KEY: ci-only-not-a-real-secret
      API_URL: http://localhost:3001

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: api

      - name: Prepare database
        run: bin/rails db:create db:migrate
        working-directory: api

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  # The branch ruleset requires this exact context name. It must always run and
  # always report, so it is `if: always()` and never path-filtered.
  gate:
    name: Lint, typecheck & build
    needs: [changes, verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report result
        working-directory: .
        run: |
          set -euo pipefail
          changes="${{ needs.changes.result }}"
          verify="${{ needs.verify.result }}"
          echo "changes=$changes verify=$verify"

          if [ "$changes" != "success" ]; then
            echo "::error::Change detection failed; refusing to report green."
            exit 1
          fi

          case "$verify" in
            success) echo "Web checks passed." ;;
            skipped) echo "Docs-only change; web checks not required." ;;
            *)       echo "::error::Web checks did not pass (result: $verify)."; exit 1 ;;
          esac
