name: api-ci

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: api

jobs:
  # Decides whether this commit touches anything the API build cares about.
  # Docs-only commits skip `verify` but still get a green `gate`, because a
  # required status check that never runs stays "expected" and blocks the push.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        working-directory: .
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only \
              "origin/${{ github.base_ref }}...${{ github.event.pull_request.head.sha }}")
          else
            before="${{ github.event.before }}"
            # First push to a branch, or a force-push: no reliable base. Run everything.
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ] \
               || ! git cat-file -e "$before^{commit}" 2>/dev/null; then
              echo "code=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            files=$(git diff --name-only "$before" "${{ github.sha }}")
          fi

          echo "Changed files:"
          printf '%s\n' "$files" | sed 's/^/  /'

          # Anything not on this list is treated as code, so an unrecognised path
          # errs toward running CI rather than skipping it.
          non_docs=$(printf '%s\n' "$files" \
            | grep -vE '(\.md$|^LICENSE$|^notes/|^web/public/llms\.txt$)' || true)

          if [ -n "$non_docs" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  verify:
    name: Rails lint, security & test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: karirkalyan
          POSTGRES_PASSWORD: karirkalyan
          POSTGRES_DB: api_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U karirkalyan"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      RUBOCOP_CACHE_ROOT: tmp/rubocop
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: karirkalyan
      DB_PASSWORD: karirkalyan
      DEVISE_JWT_SECRET_KEY: ci-only-not-a-real-secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: api

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('api/.ruby-version', 'api/**/.rubocop.yml', 'api/**/.rubocop_todo.yml', 'api/Gemfile.lock') }}
        with:
          path: api/tmp/rubocop
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Brakeman (Rails security scan)
        run: bin/brakeman --no-pager

      - name: bundler-audit (gem CVE scan)
        run: bin/bundler-audit

      - name: RuboCop
        run: bin/rubocop -f github

      - name: Prepare test database
        run: bin/rails db:test:prepare

      - name: RSpec
        run: bundle exec rspec

  # The branch ruleset requires this exact context name. It must always run and
  # always report, so it is `if: always()` and never path-filtered.
  gate:
    name: Lint, security & test
    needs: [changes, verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report result
        working-directory: .
        run: |
          set -euo pipefail
          changes="${{ needs.changes.result }}"
          verify="${{ needs.verify.result }}"
          echo "changes=$changes verify=$verify"

          if [ "$changes" != "success" ]; then
            echo "::error::Change detection failed; refusing to report green."
            exit 1
          fi

          case "$verify" in
            success) echo "API checks passed." ;;
            skipped) echo "Docs-only change; API checks not required." ;;
            *)       echo "::error::API checks did not pass (result: $verify)."; exit 1 ;;
          esac
